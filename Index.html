<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Life Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#030d1a;--card:#08152b;--card2:#0d1e36;--card3:#122240;
  --border:#1a3050;--border2:#1e3860;
  --text:#deeeff;--muted:#4a6888;--dim:#152840;
  --orange:#4895ef;--orange-bg:rgba(72,149,239,0.12);
  --green:#3ecf6e;--green-bg:rgba(62,207,110,0.1);
  --blue:#38bdf8;--blue-bg:rgba(56,189,248,0.1);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,0.1);
  --red:#f87171;--red-bg:rgba(248,113,113,0.1);
  --teal:#2dd4bf;--teal-bg:rgba(45,212,191,0.1);
  --gold:#c9a227;--gold-bg:rgba(201,162,39,0.1);
  --radius:14px;--radius-sm:10px;--font:"Syne",sans-serif;--mono:"DM Mono",monospace;
}
html.light{
  --bg:#f0f4ff;--card:#ffffff;--card2:#e8f0ff;--card3:#dde8ff;
  --border:#c5d5ef;--border2:#b0c5e8;--text:#0a1a35;--muted:#5a7aa0;--dim:#c5d5ef;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse at 15% 40%,rgba(30,70,140,0.35) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 15%,rgba(20,55,120,0.25) 0%,transparent 45%),
    radial-gradient(ellipse at 60% 85%,rgba(10,40,100,0.3) 0%,transparent 50%);
  background-attachment:fixed}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e3860;border-radius:2px}
select option{background:var(--card2);color:var(--text)}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5)}
input[type=range]{cursor:pointer;accent-color:var(--orange)}
textarea{font-family:var(--font);resize:vertical}

/* ── TOPBAR ─────────────────────────────────────── */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 0 92px;position:sticky;top:0;z-index:90;background:var(--bg)}
#username-display{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.06em}
#settings-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:16px;padding:5px 10px;cursor:pointer;font-family:var(--font)}
#settings-btn:hover{border-color:var(--orange);color:var(--orange)}

/* ── DASHBOARD TITLE ────────────────────────────── */
.dash-title{font-size:28px;font-weight:700;letter-spacing:-.025em;margin:10px 16px 14px 92px;
  background:linear-gradient(135deg,#deeeff 0%,#7ab8e8 50%,#4895ef 120%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
@media(max-width:480px){.dash-title{font-size:22px}}
html.light .dash-title{background:linear-gradient(135deg,#0a1a35 0%,#2a5fa0 120%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

/* ── GOAL TICKER ────────────────────────────────── */
.ticker-row{margin:0 16px 18px 92px;display:flex;flex-direction:column;gap:4px}
.goal-ticker{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:12px;
  background:linear-gradient(180deg,rgba(8,21,43,.82) 0%,rgba(13,30,54,.7) 100%);
  background-image:linear-gradient(180deg,rgba(8,21,43,.82) 0%,rgba(13,30,54,.7) 100%),
    repeating-linear-gradient(0deg,rgba(72,149,239,.04) 0,rgba(72,149,239,.04) 1px,transparent 1px,transparent 3px);
  border:1px solid rgba(72,149,239,.15);
  box-shadow:inset 0 1px 0 rgba(72,149,239,.08),0 0 20px rgba(72,149,239,.04);position:relative;overflow:hidden}
html.light .goal-ticker{background:rgba(72,149,239,.06);background-image:none;border:1px solid rgba(72,149,239,.2);box-shadow:inset 0 1px 0 rgba(72,149,239,.1)}
.goal-ticker::after{content:'';position:absolute;top:0;left:-40%;width:30%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(72,149,239,.07),transparent);
  animation:sweep 8s linear infinite;pointer-events:none}
@keyframes sweep{to{left:110%}}
.goal-ticker-led{display:flex;align-items:center}
.goal-ticker-led-dot{width:7px;height:7px;border-radius:50%;background:#6be3a4;
  box-shadow:0 0 8px rgba(107,227,164,.7);animation:led-pulse 1.6s ease-in-out infinite}
@keyframes led-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.85)}}
.goal-ticker-label{font-family:var(--mono);font-size:9.5px;font-weight:800;letter-spacing:.18em;color:var(--muted)}
.goal-ticker-stage{flex:1;height:22px;position:relative;overflow:hidden}
.goal-ticker-row{display:flex;align-items:center;gap:8px;height:22px;font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--text);white-space:nowrap;position:absolute;width:100%;top:0}
.goal-ticker-status{width:18px;flex-shrink:0;text-align:center;font-size:14px}
.goal-ticker-text{flex:1;overflow:hidden;text-overflow:ellipsis}
.goal-ticker-meta{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--muted);
  padding:3px 8px;border-radius:20px;background:rgba(255,255,255,.04);white-space:nowrap}
.goal-ticker-row.is-leaving{animation:ticker-leave .45s cubic-bezier(.55,0,.55,1) forwards}
.goal-ticker-row.is-entering{animation:ticker-enter .45s cubic-bezier(.22,1,.36,1) forwards}
@keyframes ticker-leave{to{opacity:0;transform:translateY(-100%)}}
@keyframes ticker-enter{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.goal-ticker{padding:9px 12px}.goal-ticker-label{font-size:9px;letter-spacing:.14em}.goal-ticker-row{font-size:12px}.goal-ticker-meta{font-size:10px;padding:2px 7px}}

/* ── NAV ────────────────────────────────────────── */
#bottom-nav{position:fixed;top:0;left:0;bottom:0;width:76px;
  background:rgba(3,10,22,.97);
  backdrop-filter:blur(14px);border-right:1px solid var(--border);z-index:100;
  padding:16px 6px 16px;overflow-y:auto;overflow-x:hidden}
html.light #bottom-nav{background:rgba(240,244,255,.97)}
.nav-inner{display:flex;flex-direction:column;gap:4px;padding:0}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;
  background:none;border:1px solid var(--border);border-radius:10px;cursor:pointer;width:100%;transition:all .15s;font-family:var(--font)}
.nav-btn:hover{border-color:var(--orange);background:rgba(72,149,239,0.06)}
.nav-btn.active{background:var(--orange-bg);border-color:var(--orange)}
.nav-btn span.icon{font-size:17px;line-height:1}
.nav-btn span.lbl{font-size:7.5px;color:var(--muted);font-weight:400;letter-spacing:.04em;white-space:nowrap}
.nav-btn.active span.lbl{color:var(--orange);font-weight:700}

/* ── PAGE ───────────────────────────────────────── */
.page{padding:16px 16px 40px 92px;min-height:100vh;animation:fade-in .2s ease}
@keyframes fade-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.page-title{font-size:18px;font-weight:800;color:var(--text);letter-spacing:.04em}
.row{display:flex;align-items:center;gap:10px}
.col{display:flex;flex-direction:column;gap:8px}
.between{justify-content:space-between}
.section-label{font-size:10px;color:var(--muted);letter-spacing:.08em;font-weight:600;text-transform:uppercase;margin-bottom:2px}

/* ── CARDS ──────────────────────────────────────── */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;margin-bottom:14px;box-shadow:0 2px 16px rgba(0,0,0,.4),inset 0 1px 0 rgba(72,149,239,.06)}
.card2{background:var(--card2);border-radius:var(--radius-sm);border:1px solid var(--border);padding:12px 14px}
.card-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.card-row:last-child{border-bottom:none}

/* ── BUTTONS ────────────────────────────────────── */
.btn{background:var(--orange);color:#fff;border:none;border-radius:var(--radius-sm);
  padding:10px 20px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.03em;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-green{background:var(--green);color:#000}
.btn-purple{background:var(--purple)}
.btn-red{background:var(--red)}
.btn-blue{background:var(--blue);color:#fff}
.btn-teal{background:var(--teal);color:#000}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:9px 18px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-ghost:hover{border-color:var(--orange);color:var(--orange)}
.btn-sm{padding:6px 14px;font-size:11px}
.btn-xs{padding:4px 10px;font-size:10px}
.btn-full{width:100%}

/* ── INPUTS ─────────────────────────────────────── */
.inp{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text);padding:10px 12px;font-family:var(--font);font-size:13px;width:100%;outline:none;transition:border .15s}
.inp:focus{border-color:var(--orange)}
.inp-sm{padding:7px 10px;font-size:12px}
.lbl{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;display:block;font-weight:600}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* ── FILTER TABS ─────────────────────────────────── */
.filter-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.filter-tab{padding:7px 14px;font-size:11px;white-space:nowrap;flex-shrink:0;background:transparent;
  color:var(--muted);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font);font-weight:500;transition:all .15s}
.filter-tab.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.filter-tab.active-purple{background:var(--purple);color:#fff;border-color:var(--purple)}
.filter-tab.active-red{background:var(--red);color:#fff;border-color:var(--red)}
.filter-tab.active-blue{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── SCORE RING ──────────────────────────────────── */
.score-ring-wrap{position:relative;flex-shrink:0}
.score-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-size:22px;font-weight:800;color:var(--orange);line-height:1;font-family:var(--mono)}
.score-denom{font-size:8px;color:var(--muted);letter-spacing:.06em;font-weight:600}

/* ── HABIT DOTS ──────────────────────────────────── */
.habit-dots{display:flex;gap:4px;flex-wrap:wrap}
.habit-dot{width:10px;height:10px;border-radius:50%;cursor:pointer;transition:background .2s}

/* ── HABIT ITEM ──────────────────────────────────── */
.habit-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-sm);
  border:1px solid var(--border);cursor:pointer;transition:all .2s;background:var(--card2)}
.habit-item.done{background:var(--green-bg);border-color:rgba(62,207,110,.27)}
.habit-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--dim);
  background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.habit-item.done .habit-check{background:var(--green);border-color:var(--green)}
.habit-name{font-size:12px;flex:1;color:var(--muted);font-weight:400}
.habit-item.done .habit-name{color:var(--text);font-weight:600}
.habit-pts{font-size:11px;font-family:var(--mono);font-weight:600;color:var(--dim)}
.habit-item.done .habit-pts{color:var(--green)}

/* ── CHECKBOX ────────────────────────────────────── */
.cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--dim);background:transparent;
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
.cb.done{background:var(--green);border-color:var(--green)}
.cb.done::after{content:'✓';font-size:12px;color:#fff;font-weight:800}

/* ── CALENDAR ────────────────────────────────────── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:14px}
.cal-day-lbl{text-align:center;font-size:10px;color:var(--muted);font-weight:600;padding:4px 0}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;gap:2px;transition:all .15s}
.cal-day:hover{border-color:var(--orange)}
.cal-day.today{background:var(--orange-bg);border-color:rgba(245,166,35,.44)}
.cal-day.selected{background:var(--orange);border-color:var(--orange)}
.cal-day-num{font-size:12px;font-weight:400;color:var(--text)}
.cal-day.today .cal-day-num{color:var(--orange);font-weight:700}
.cal-day.selected .cal-day-num{color:#fff;font-weight:700}
.cal-dots{display:flex;gap:2px}
.cal-dot{width:4px;height:4px;border-radius:50%}
.cal-day.selected .cal-dot{background:rgba(255,255,255,.7) !important}

/* ── STAT CARDS ──────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
  text-align:center;padding:14px 10px}
.stat-val{font-size:24px;font-weight:800;font-family:var(--mono)}
.stat-lbl{font-size:10px;color:var(--muted);letter-spacing:.08em;font-weight:600;margin-top:4px}

/* ── MODAL ───────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:flex-end}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;
  padding:20px 16px 48px;animation:slide-up .3s cubic-bezier(.22,1,.36,1)}
@keyframes slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700;color:var(--text)}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:0;line-height:1}

/* ── PROGRESS BAR ────────────────────────────────── */
.prog-bar{height:5px;background:var(--dim);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s ease}

/* ── PILL BADGE ──────────────────────────────────── */
.pill{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;display:inline-block}

/* ── TODO LIST ───────────────────────────────────── */
.todo-item{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:var(--radius-sm);
  background:var(--card2);border:1px solid var(--border);margin-bottom:6px;transition:all .2s;cursor:default}
.todo-item.done-row{opacity:.6;text-decoration:line-through;color:var(--muted)}
.todo-item.flash{animation:queue-flash .6s ease}
@keyframes queue-flash{0%,100%{background:var(--card2)}40%{background:rgba(245,166,35,.2)}}
.todo-drag{cursor:grab;color:var(--dim);font-size:18px;flex-shrink:0}
.todo-text{flex:1;font-size:13px;color:var(--text);outline:none;background:none;border:none;font-family:var(--font);cursor:text}
.todo-text.done-row{color:var(--muted)}
.todo-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:0 2px;flex-shrink:0}
.todo-del:hover{color:var(--red)}
.todo-add-row{display:flex;gap:8px;margin-top:8px}

/* ── GYM BODY CHART ──────────────────────────────── */
.body-chart-wrap{display:flex;gap:20px;justify-content:center;padding:10px 0}
.body-svg{width:140px;flex-shrink:0}
.body-svg .muscle-group{fill:rgba(62,207,110,.15);stroke:var(--green);stroke-width:1.5;
  cursor:pointer;transition:fill .2s}
.body-svg .muscle-group:hover{fill:rgba(62,207,110,.35)}
.body-svg .muscle-group.worked{fill:rgba(245,166,35,.4);stroke:var(--orange)}
.body-svg .muscle-group.fresh{fill:rgba(62,207,110,.4);stroke:var(--green)}
.body-outline{fill:none;stroke:var(--dim);stroke-width:1.5}
.body-label{font-size:7px;fill:var(--muted);font-family:var(--mono);text-anchor:middle;pointer-events:none}
.muscle-timer-overlay{font-size:7px;fill:var(--orange);font-family:var(--mono);text-anchor:middle;pointer-events:none;font-weight:700}

/* ── EXERCISE CHART ──────────────────────────────── */
.chart-canvas{width:100%;height:120px;display:block}

/* ── SETTINGS ────────────────────────────────────── */
.settings-section{margin-bottom:20px}
.settings-section-title{font-size:11px;color:var(--orange);letter-spacing:.1em;font-weight:700;
  text-transform:uppercase;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.toggle-lbl{font-size:13px;color:var(--text);font-weight:500}
.toggle-sub{font-size:11px;color:var(--muted);margin-top:2px}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--dim);position:relative;cursor:pointer;
  border:none;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--orange)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;
  top:3px;left:3px;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}

/* ── API STATUS ──────────────────────────────────── */
.api-status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.api-status.connected{background:var(--green);box-shadow:0 0 6px rgba(62,207,110,.6)}
.api-status.disconnected{background:var(--dim)}
.api-status.error{background:var(--red)}

/* ── JOURNAL ─────────────────────────────────────── */
.journal-entry{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:10px}
.mood-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.mood-btn{font-size:22px;background:none;border:1px solid var(--border);border-radius:8px;padding:6px;cursor:pointer;transition:all .15s}
.mood-btn.selected{background:var(--purple-bg);border-color:var(--purple)}

/* ── HEATMAP ─────────────────────────────────────── */
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.heatmap-cell{aspect-ratio:1;border-radius:4px;background:var(--orange);transition:opacity .2s}

/* ── FINANCE ─────────────────────────────────────── */
.balance-hero{font-size:36px;font-weight:800;font-family:var(--mono);color:var(--green)}
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.tx-amount{font-family:var(--mono);font-size:14px;font-weight:700}
.tx-income{color:var(--green)}
.tx-expense{color:var(--red)}

/* ── PLAID CONNECT ───────────────────────────────── */
.plaid-btn{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card2);
  border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;width:100%;margin-bottom:8px;font-family:var(--font)}
.plaid-logo{font-size:20px}
.plaid-name{font-size:13px;font-weight:600;color:var(--text);flex:1;text-align:left}
.plaid-status{font-size:11px;color:var(--muted)}

/* ── SCORE HISTORY CANVAS ────────────────────────── */
.score-chart-canvas{width:100%;height:90px;display:block}

/* ── WORKOUT ACTIVE (legacy - kept for edit view) ──── */
.exercise-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:12px;margin-bottom:10px}
.exercise-name-inp{background:none;border:none;color:var(--orange);font-size:15px;font-weight:700;
  font-family:var(--font);outline:none;width:100%;margin-bottom:10px}
.set-grid{display:grid;grid-template-columns:24px 1fr 1fr 32px;gap:6px;align-items:center;margin-bottom:6px}
.set-num{text-align:center;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--muted)}
.set-inp{background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);
  padding:8px 6px;font-family:var(--mono);font-size:14px;font-weight:600;text-align:center;outline:none;width:100%;transition:border .15s}
.set-inp:focus{border-color:var(--orange)}
.set-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;text-align:center;width:100%;font-family:var(--font)}
.pr-badge{font-size:10px;color:var(--orange);font-weight:600;margin-bottom:6px}
/* ── GYM WORKOUT V2 ──────────────────────────────── */

//  SCORE CALCULATIONS
// ════════════════════════════════════════════════
function calcScore(dateStr){
  const completed=S.habitLog[dateStr]||[];
  return S.habits.filter(h=>completed.includes(h.id)).reduce((a,h)=>a+h.points,0);
}
function calcStreak(){
  let s=0;const now=new Date();
  for(let i=0;i<365;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const k=d.toISOString().split('T')[0];
    if((S.habitLog[k]||[]).length>0)s++;
    else if(i>0)break;
  }
  return s;
}
function calc30DayAvg(){
  const today=new Date();const vals=[];
  for(let i=0;i<30;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const k=d.toISOString().split('T')[0];
    const sc=calcScore(k);
    if(sc>0)vals.push(sc);
  }
  return vals.length?Math.round(vals.reduce((a,v)=>a+v,0)/vals.length):0;
}
function get30DayHistory(){
  const today=new Date();
  return Array.from({length:30},(_,i)=>{
    const d=new Date(today);d.setDate(d.getDate()-(29-i));
    const k=d.toISOString().split('T')[0];
    return{date:k,score:calcScore(k),label:`${d.getMonth()+1}/${d.getDate()}`};
  });
}

function drawBarChart(canvasId,data,options={}){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth*window.devicePixelRatio||canvas.width;
  const H=canvas.offsetHeight*window.devicePixelRatio||canvas.height;
  canvas.width=W;canvas.height=H;
  const {color='#f5a623',maxVal,showLabels=true}=options;
  const max=maxVal||Math.max(...data.map(d=>d.value),1);
  const barW=(W-20)/data.length*0.7;
  const gap=(W-20)/data.length*0.3;
  ctx.clearRect(0,0,W,H);
  data.forEach((d,i)=>{
    const barH=(d.value/max)*(H-24);
    const x=10+i*(barW+gap)+(gap/2);
    const y=H-barH-(showLabels?20:4);
    const alpha=0.3+0.7*(d.value/max);
    ctx.fillStyle=color;
    ctx.globalAlpha=Math.max(0.15,alpha);
    ctx.beginPath();
    ctx.roundRect(x,y,barW,barH,3);
    ctx.fill();
    ctx.globalAlpha=1;
    if(showLabels&&d.label&&i%Math.ceil(data.length/8)===0){
      ctx.fillStyle=S.theme==='light'?'#888':'#666';
      ctx.font=`${9*window.devicePixelRatio}px DM Mono`;
      ctx.textAlign='center';
      ctx.fillText(d.label,x+barW/2,H-4);
    }
  });
}
function drawLineChart(canvasId,data,options={}){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth*window.devicePixelRatio||canvas.width;
  const H=canvas.offsetHeight*window.devicePixelRatio||canvas.height;
  canvas.width=W;canvas.height=H;
  const {color='#f5a623',showLabels=true}=options;
  const max=Math.max(...data.map(d=>d.value),1);
  const min=Math.min(...data.map(d=>d.value));
  const range=max-min||1;
  const pts=data.map((d,i)=>({
    x:20+(i/(data.length-1||1))*(W-40),
    y:20+((max-d.value)/range)*(H-40)
  }));
  ctx.clearRect(0,0,W,H);
  if(pts.length<2)return;
  // gradient fill
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,color+'44');grad.addColorStop(1,color+'00');
  ctx.beginPath();
  ctx.moveTo(pts[0].x,H);pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(pts[pts.length-1].x,H);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();
  // line
  ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2*window.devicePixelRatio;ctx.lineJoin='round';
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();
  // dots
  pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,3*window.devicePixelRatio,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();});
  // labels
  if(showLabels){
    ctx.fillStyle=S.theme==='light'?'#888':'#666';
    ctx.font=`${9*window.devicePixelRatio}px DM Mono`;ctx.textAlign='center';
    data.forEach((d,i)=>{if(i%Math.ceil(data.length/5)===0)ctx.fillText(d.label||'',pts[i].x,H-2);});
  }
}
function drawScoreRingCanvas(canvasId,score){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const size=canvas.offsetWidth||88;
  canvas.width=size*window.devicePixelRatio;canvas.height=size*window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
  const cx=size/2,cy=size/2,r=size/2-6;
  // track
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#3a3a3a';ctx.lineWidth=6;ctx.stroke();
  // fill
  const angle=(score/100)*Math.PI*2-Math.PI/2;
  ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,angle);ctx.strokeStyle='#f5a623';ctx.lineWidth=6;
  ctx.lineCap='round';ctx.stroke();
}

    muscles.forEach(m=>{log[m]=now;});
  });
  S.muscleLog=log;save();
}
function getMuscleStatus(muscleName){
  const ts=S.muscleLog?.[muscleName];
  if(!ts)return 'fresh';
  const elapsed=(Date.now()-ts)/(1000*60*60); // hours
  if(elapsed<48)return 'worked';
  return 'fresh';
}
function getMuscleTimer(muscleName){
  const ts=S.muscleLog?.[muscleName];
  if(!ts)return null;
  const elapsed=(Date.now()-ts)/(1000*60*60);
  const remaining=48-elapsed;
  if(remaining<=0)return null;
  const h=Math.floor(remaining);const m=Math.floor((remaining-h)*60);
  return `${h}h${m>0?m+'m':''}`;
}

// ════════════════════════════════════════════════
let tickerIdx=0;let tickerInterval=null;
function getTodayGoals(){
  const key=todayStr();
  return S.todayGoals[key]||[];
}
function setTodayGoals(goals){
  const key=todayStr();
  S.todayGoals={...S.todayGoals,[key]:goals};
  save();
  window.dispatchEvent(new CustomEvent('goals-changed'));
}
function tickerItems(){
  const goals=getTodayGoals();
  const total=goals.length;
  if(total===0)return[{status:'empty',text:'No goals set for today — add one to get rolling.',done:false}];
  const done=goals.filter(g=>g.done).length;
  if(done===total)return[{status:'done',text:'✓ All goals done — solid day.',done:true}];
  return goals.filter(g=>!g.done).map(g=>({status:'pending',text:g.text,done:false}));
}
function tickerStatusIcon(status){
  if(status==='done')return'<span style="color:var(--green)">✓</span>';
  if(status==='pending')return'<span style="color:var(--muted)">○</span>';
  return'<span style="color:var(--muted)">·</span>';
}
function tickerMeta(){
  const goals=getTodayGoals();
  const done=goals.filter(g=>g.done).length;
  return `${done}/${goals.length}`;
}
function tick(first=false){
  const stage=document.getElementById('goalTickerStage');
  const meta=document.getElementById('goalTickerMeta');
  if(!stage)return;
  const items=tickerItems();
  if(!items.length)return;
  tickerIdx=tickerIdx%items.length;
  const item=items[tickerIdx];
  tickerIdx=(tickerIdx+1)%items.length;
  const newRow=document.createElement('div');
  newRow.className='goal-ticker-row';
  newRow.innerHTML=`<span class="goal-ticker-status">${tickerStatusIcon(item.status)}</span><span class="goal-ticker-text">${esc(item.text)}</span>`;
  const old=stage.querySelector('.goal-ticker-row');
  if(!first&&old){
    old.classList.add('is-leaving');
    newRow.classList.add('is-entering');
    stage.appendChild(newRow);
    setTimeout(()=>old.remove(),460);
  } else {
    if(old)old.remove();
    stage.appendChild(newRow);
  }
  if(meta)meta.textContent=tickerMeta();
}
function initTicker(){
  clearInterval(tickerInterval);
  tickerIdx=0;
  tick(true);
  tickerInterval=setInterval(()=>tick(false),5000);
}
window.addEventListener('goals-changed',()=>{tickerIdx=0;tick(false);});

function calcNetWorth(){
  return S.accounts.reduce((sum,a)=>{
    const bal=parseFloat(a.balance)||0;
    return sum+(a.type==='credit'?-bal:bal);
  },0);
}
function snapshotNetWorth(){
  const nw=calcNetWorth();
  const today=todayStr();
  const hist=S.netWorthHistory||[];
  if(hist.length&&hist[hist.length-1].date===today){
    hist[hist.length-1].value=nw;
  } else {
    hist.push({date:today,value:nw});
    if(hist.length>90)hist.shift();
  }
  S.netWorthHistory=hist;save();
}
function drawNetWorthSparkline(canvasId){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  const hist=S.netWorthHistory||[];
  if(hist.length<2)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth*window.devicePixelRatio||canvas.width;
  const H=canvas.offsetHeight*window.devicePixelRatio||canvas.height;
  canvas.width=W;canvas.height=H;
  const vals=hist.map(h=>h.value);
  const max=Math.max(...vals);const min=Math.min(...vals);const range=max-min||1;
  const pts=vals.map((v,i)=>({x:(i/(vals.length-1||1))*(W-4)+2,y:H-2-((v-min)/range)*(H-4)}));
  const color='#3ecf6e';
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,color+'55');grad.addColorStop(1,color+'00');
  ctx.beginPath();ctx.moveTo(pts[0].x,H);pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(pts[pts.length-1].x,H);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2*window.devicePixelRatio;ctx.lineJoin='round';
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();
}

let calView='all';let calMonth=new Date().getMonth();let calYear=new Date().getFullYear();let calSelected=null;
function renderCalendar(){
  const today=todayStr();
  const typeColors={tennis:'var(--blue)',academic:'var(--orange)',social:'var(--teal)',gym:'var(--purple)',general:'var(--muted)'};
  const filtered=calView==='all'?S.events:S.events.filter(e=>e.type===calView);
  const byDay={};filtered.forEach(e=>{if(!byDay[e.date])byDay[e.date]=[];byDay[e.date].push(e);});
  const days=getDaysInMonth(calYear,calMonth);const first=getFirstDay(calYear,calMonth);
  const monthName=new Date(calYear,calMonth,1).toLocaleDateString('en-US',{month:'long',year:'numeric'}).toUpperCase();
  const dayLabels=['S','M','T','W','T','F','S'].map(d=>`<div class="cal-day-lbl">${d}</div>`).join('');
  const blanks=Array.from({length:first}).map(()=>`<div></div>`).join('');
  const daysCells=Array.from({length:days},(_,i)=>{
    const d=i+1;
    const dk=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs=byDay[dk]||[];
    const isToday=dk===today;const isSel=dk===calSelected;
    const dots=evs.slice(0,3).map(e=>`<div class="cal-dot" style="background:${isSel?'#000':typeColors[e.type]||'var(--muted)'}"></div>`).join('');
    return`<div class="cal-day${isToday?' today':''}${isSel?' selected':''}" data-calday="${dk}">
      <span class="cal-day-num">${d}</span>
      ${dots?`<div class="cal-dots">${dots}</div>`:''}
    </div>`;
  }).join('');
  const selEvts=calSelected&&byDay[calSelected]?byDay[calSelected]:[];
  const selHtml=calSelected?`<div class="card">
    <div class="section-label" style="margin-bottom:12px">${fmtFull(calSelected).toUpperCase()}</div>
    ${selEvts.length===0?`<div class="empty">No events · <span class="inline-link" onclick="App.openAddEvent('${calSelected}')">Add one</span></div>`:
    selEvts.map(e=>`<div class="card-row">
      <div style="width:3px;height:32px;border-radius:2px;background:${typeColors[e.type]||'var(--muted)'}"></div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600">${esc(e.title)}</div>${e.time?`<div style="font-size:11px;color:var(--muted)">${esc(e.time)}</div>`:''}</div>
      <button class="todo-del" onclick="App.deleteEvent('${e.id}')">✕</button>
    </div>`).join('')}
  </div>`:'';

  return`<div class="page">
  <div class="row between" style="margin-bottom:14px">
    <div class="page-title">CALENDAR</div>
    <button class="btn btn-sm" onclick="App.openAddEvent()">+ EVENT</button>
  </div>
  <div class="filter-tabs">
    ${[['all','ALL'],['tennis','🎾 TENNIS'],['academic','📚 SCHOOL'],['social','👥 SOCIAL']].map(([v,l])=>`<button class="filter-tab${calView===v?' active':''}" onclick="App.setCalView('${v}')">${l}</button>`).join('')}
  </div>
  <div class="month-nav">
    <button class="month-nav-btn" onclick="App.calPrev()">‹</button>
    <span class="month-name">${monthName}</span>
    <button class="month-nav-btn" onclick="App.calNext()">›</button>
  </div>
  <div class="cal-grid">${dayLabels}</div>
  <div class="cal-grid">${blanks}${daysCells}</div>
  ${selHtml}
  </div>`;
}

function getExerciseEmoji(name){
  const ex=EXERCISE_DB.find(e=>e.name===name);
  if(ex)return ex.emoji;
  const n=(name||'').toLowerCase();
  if(n.includes('squat')||n.includes('lunge'))return '🦵';
  if(n.includes('curl'))return '💪';
  if(n.includes('press'))return '🏋️';
  if(n.includes('pull')||n.includes('row'))return '🤸';
  return '💪';
}

function getPrevSetsForExercise(name){
  for(const session of S.gymSessions){
    const ex=session.exercises.find(e=>e.name===name);
    if(ex)return ex.sets||[];
  }
  return [];
}

function getPRs(){
  const m={};
  S.gymSessions.forEach(s=>s.exercises.forEach(e=>{
    const maxW=Math.max(...e.sets.map(st=>parseFloat(st.weight)||0),0);
    if(!m[e.name]||maxW>m[e.name])m[e.name]=maxW;
  }));
  return m;
}
function getPRForExercise(name){
  const entries=S.gymSessions.flatMap(s=>s.exercises.filter(e=>e.name===name).map(e=>Math.max(...e.sets.map(st=>parseFloat(st.weight)||0),0)));
  return entries.length?Math.max(...entries):0;
}

let schoolFilter='all';let schoolView='assignments';
const GRADE_MAP={'A+':4.3,'A':4.0,'A-':3.7,'B+':3.3,'B':3.0,'B-':2.7,'C+':2.3,'C':2.0,'C-':1.7,'D+':1.3,'D':1.0,'F':0};
function gradeToGpa(g){if(!g)return null;const v=GRADE_MAP[g.toUpperCase()];if(v!==undefined)return v;const n=parseFloat(g);if(!isNaN(n)){if(n>=97)return 4.3;if(n>=93)return 4.0;if(n>=90)return 3.7;if(n>=87)return 3.3;if(n>=83)return 3.0;if(n>=80)return 2.7;if(n>=77)return 2.3;if(n>=73)return 2.0;if(n>=70)return 1.7;if(n>=60)return 1.0;return 0;}return null;}
function calcCourseGpa(courseName){
  const graded=S.assignments.filter(a=>a.course===courseName&&a.grade);
  if(!graded.length)return null;
  const pts=graded.map(a=>gradeToGpa(a.grade)).filter(v=>v!==null);
  return pts.length?(pts.reduce((s,v)=>s+v,0)/pts.length).toFixed(2):null;
}
function calcOverallGpa(){
  const graded=S.assignments.filter(a=>a.grade);
  if(!graded.length)return null;
  const pts=graded.map(a=>gradeToGpa(a.grade)).filter(v=>v!==null);
  return pts.length?(pts.reduce((s,v)=>s+v,0)/pts.length).toFixed(2):null;
}

//  SANKEY CHART
// ════════════════════════════════════════════════
function drawSankeyChart(canvasId,income,catTotals){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const DPR=window.devicePixelRatio||1;
  const W=canvas.offsetWidth*DPR;const H=canvas.offsetHeight*DPR;
  canvas.width=W;canvas.height=H;
  ctx.clearRect(0,0,W,H);
  const total=income||1;
  const nodeW=18*DPR;const pad=10*DPR;
  const leftX=nodeW;const rightX=W-nodeW;
  const colors=['#3ecf6e','#38bdf8','#a78bfa','#f5a623','#f87171','#2dd4bf','#fb923c','#e879f9'];
  // Left node (income)
  const lH=H-pad*2;
  ctx.fillStyle='#3ecf6e';
  ctx.beginPath();ctx.roundRect(0,pad,nodeW,lH,4*DPR);ctx.fill();
  // Label
  ctx.fillStyle=S.theme==='light'?'#333':'#aaa';
  ctx.font=`bold ${10*DPR}px DM Mono`;ctx.textAlign='left';
  ctx.fillText('INCOME',nodeW+6*DPR,pad+16*DPR);
  ctx.fillStyle=S.theme==='light'?'#1a1a1a':'#f0f0f0';
  ctx.font=`bold ${12*DPR}px DM Mono`;
  ctx.fillText('$'+income.toFixed(0),nodeW+6*DPR,pad+30*DPR);
  // Right nodes + flows
  const entries=catTotals.filter(c=>c.value>0);
  if(!entries.length)return;
  const totalCat=entries.reduce((s,c)=>s+c.value,0)||1;
  let rightY=pad;
  entries.forEach((cat,i)=>{
    const ratio=cat.value/totalCat;
    const rH=Math.max((lH*ratio),8*DPR);
    const lStartY=pad+(lH*(entries.slice(0,i).reduce((s,c)=>s+c.value/totalCat,0)));
    const lEndY=lStartY+(lH*ratio);
    const color=colors[i%colors.length];
    // Flow bezier
    ctx.beginPath();
    ctx.moveTo(nodeW,lStartY);
    ctx.bezierCurveTo(W*0.45,lStartY,W*0.45,rightY,rightX,rightY);
    ctx.lineTo(rightX,rightY+rH);
    ctx.bezierCurveTo(W*0.45,rightY+rH,W*0.45,lEndY,nodeW,lEndY);
    ctx.closePath();
    ctx.fillStyle=color+'40';ctx.fill();
    // Right node
    ctx.fillStyle=color;
    ctx.beginPath();ctx.roundRect(rightX,rightY,nodeW,rH,4*DPR);ctx.fill();
    // Right label
    const pct=Math.round(cat.value/total*100);
    ctx.fillStyle=S.theme==='light'?'#1a1a1a':'#f0f0f0';
    ctx.font=`bold ${9*DPR}px DM Mono`;ctx.textAlign='right';
    const midY=rightY+rH/2+4*DPR;
    ctx.fillText(cat.label+' '+pct+'%',rightX-4*DPR,midY);
    rightY+=rH+(rH>12*DPR?4*DPR:1*DPR);
  });
}

function renderSocial(){
  const today=todayStr();
  const shouldReach=c=>{
    if(!c.lastContact)return true;
    const days={weekly:7,biweekly:14,monthly:30};
    return(new Date(today)-new Date(c.lastContact))/86400000>=(days[c.frequency]||30);
  };
  const needsReach=S.contacts.filter(shouldReach);
  const reachHtml=needsReach.length===0?'':`<div class="card" style="border-color:rgba(45,212,191,.3)">
    <div class="section-label" style="color:var(--teal);margin-bottom:12px">REACH OUT 👋</div>
    ${needsReach.map(c=>`<div class="card-row">
      <div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(c.name)}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">Last: ${c.lastContact?fmtShort(c.lastContact):'Never'}</div></div>
      <button class="btn btn-teal btn-sm" onclick="App.markContacted('${c.id}')">✓ DONE</button>
    </div>`).join('')}
  </div>`;
  const contactsHtml=S.contacts.map(c=>`<div class="card-row">
    <div class="contact-avatar">${c.name[0].toUpperCase()}</div>
    <div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(c.name)}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">${esc(c.frequency)} · last ${c.lastContact?fmtShort(c.lastContact):'never'}</div></div>
    ${shouldReach(c)?'<div class="reach-dot"></div>':''}
    <button class="todo-del" onclick="App.deleteContact('${c.id}')">✕</button>
  </div>`).join('');
  return`<div class="page">
  <div class="row between" style="margin-bottom:14px">
    <div class="page-title">SOCIAL</div>
    <button class="btn btn-teal btn-sm" onclick="App.openAddContact()">+ CONTACT</button>
  </div>
  ${reachHtml}
  <div class="card"><div class="section-label" style="margin-bottom:12px">CONTACTS (${S.contacts.length})</div>${S.contacts.length===0?'<div class="empty">No contacts yet</div>':contactsHtml}</div>
  </div>`;
}

function bindPageEvents(){
  // Calendar days
  document.querySelectorAll('[data-calday]').forEach(el=>{
    el.addEventListener('click',()=>{
      const dk=el.dataset.calday;
      calSelected=calSelected===dk?null:dk;
      renderPage();
    });
  });
  // Sleep quality display
  const sleepQ=document.getElementById('sleep-quality');
  if(sleepQ)sleepQ.addEventListener('input',e=>{
    const el=document.getElementById('sleep-stars');
    if(el)el.textContent='⭐'.repeat(+e.target.value);
  });
}

function bindDragAndDrop(){
  const list=document.getElementById('goal-list');
  if(!list)return;
  let dragged=null;
  list.querySelectorAll('.todo-item[draggable]').forEach(item=>{
    item.addEventListener('dragstart',e=>{dragged=item;item.style.opacity='.4';});
    item.addEventListener('dragend',()=>{dragged=null;item.style.opacity='';});
    item.addEventListener('dragover',e=>{e.preventDefault();});
    item.addEventListener('drop',e=>{
      e.preventDefault();
      if(dragged&&dragged!==item){
        const from=+dragged.dataset.goalIdx;
        const to=+item.dataset.goalIdx;
        const goals=getTodayGoals();
        const moved=goals.splice(from,1)[0];
        goals.splice(to,0,moved);
        setTodayGoals(goals);
        renderPage();
      }
    });
  });
}

function bindGymEvents(){
  const searchInp=document.getElementById('gym-ex-search');
  if(searchInp){
    searchInp.focus();
    searchInp.addEventListener('input',e=>{
      gymExPickerSearch=e.target.value;
      const q=e.target.value.toLowerCase();
      document.querySelectorAll('.gym-picker-item').forEach(item=>{
        const name=item.dataset.exname||'';
        item.style.display=name.includes(q)||!q?'':'none';
      });
    });
  }
}

    }

  },
  numpadKey(k){
    if(!gymNumpad)return;
    if(k==='⌫'){gymNumpad.value=gymNumpad.value.slice(0,-1);}
    else if(k==='.'&&gymNumpad.value.includes('.')){}
    else{gymNumpad.value+=k;}
    const el=document.getElementById('gym-numpad-val');
    if(el)el.textContent=gymNumpad.value||'0';
    if(gymSession)gymSession.exercises[gymNumpad.ei].sets[gymNumpad.si][gymNumpad.field]=gymNumpad.value;
    // update the cell in the workout too
    const cells=document.querySelectorAll('.gym-set-row');
    if(cells[gymNumpad.si]){
      const idx=gymNumpad.field==='weight'?2:3;
      const cell=cells[gymNumpad.si]?.children[idx];
      if(cell)cell.textContent=gymNumpad.value||'0';
    }
  },
  numpadAdj(delta){
    if(!gymNumpad)return;
    const n=Math.max(0,parseFloat(gymNumpad.value||0)+delta);
    gymNumpad.value=Number.isInteger(n)?String(n):n.toFixed(1).replace(/\.0$/,'');
    const el=document.getElementById('gym-numpad-val');
    if(el)el.textContent=gymNumpad.value;
    if(gymSession)gymSession.exercises[gymNumpad.ei].sets[gymNumpad.si][gymNumpad.field]=gymNumpad.value;
  },
  numpadNext(){
    if(!gymNumpad||!gymSession)return;
    gymSession.exercises[gymNumpad.ei].sets[gymNumpad.si][gymNumpad.field]=gymNumpad.value;
    const ex=gymSession.exercises[gymNumpad.ei];
    if(gymNumpad.field==='weight'){
      gymNumpad={...gymNumpad,field:'reps',value:String(ex.sets[gymNumpad.si].reps||'')};
      renderPage();
    } else {
      const nextSi=gymNumpad.si+1;
      if(nextSi<ex.sets.length){
        gymNumpad={...gymNumpad,si:nextSi,field:'weight',value:String(ex.sets[nextSi].weight||'')};
        renderPage();
      } else {
        gymNumpad=null;renderPage();
      }
    }
  },
  numpadCopy(){
    if(!gymNumpad||!gymSession||gymNumpad.si===0)return;
    const prev=gymSession.exercises[gymNumpad.ei].sets[gymNumpad.si-1];
    if(gymNumpad.field==='weight'&&prev.weight)gymNumpad.value=String(prev.weight);
    else if(gymNumpad.field==='reps'&&prev.reps)gymNumpad.value=String(prev.reps);
    const el=document.getElementById('gym-numpad-val');
    if(el)el.textContent=gymNumpad.value||'0';
    if(gymSession)gymSession.exercises[gymNumpad.ei].sets[gymNumpad.si][gymNumpad.field]=gymNumpad.value;
  },
  startRestCountdown(ei,secs){
    clearInterval(gymRestInterval);
    gymRestState={remaining:secs,total:secs,ei};
    gymRestInterval=setInterval(()=>{
      if(!gymRestState){clearInterval(gymRestInterval);return;}
      gymRestState.remaining--;
      if(gymRestState.remaining<=0){
        clearInterval(gymRestInterval);gymRestState=null;renderPage();return;
      }
      const m=Math.floor(gymRestState.remaining/60).toString().padStart(2,'0');
      const s=(gymRestState.remaining%60).toString().padStart(2,'0');
      const dEl=document.getElementById('gym-rest-display');
      if(dEl)dEl.textContent=`${m}:${s}`;
      const circ=document.getElementById('gym-rest-progress');
      if(circ){const C=2*Math.PI*45;circ.style.strokeDashoffset=C*(1-gymRestState.remaining/gymRestState.total);}
    },1000);
    renderPage();
  },
  showRestModal(){renderPage();},
  skipRest(){clearInterval(gymRestInterval);gymRestState=null;renderPage();},
  adjustRest(delta){
    if(!gymRestState)return;
    gymRestState.remaining=Math.max(0,gymRestState.remaining+delta);
    const m=Math.floor(gymRestState.remaining/60).toString().padStart(2,'0');
    const s=(gymRestState.remaining%60).toString().padStart(2,'0');
    const el=document.getElementById('gym-rest-display');
    if(el)el.textContent=`${m}:${s}`;
    const circ=document.getElementById('gym-rest-progress');
    if(circ){const C=2*Math.PI*45;circ.style.strokeDashoffset=C*(1-gymRestState.remaining/Math.max(gymRestState.total,1));}
  },
  closeRestModal(){clearInterval(gymRestInterval);gymRestState=null;renderPage();},

  openAddTx(){
    openModal(`<div class="modal-header"><span class="modal-title">LOG TRANSACTION</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="col">
      <div class="row" style="gap:8px">
        <button id="tx-exp-btn" class="btn btn-full" style="background:rgba(248,113,113,.2);color:var(--red);border:1px solid rgba(248,113,113,.4)" onclick="App.setTxType('expense')">EXPENSE</button>
        <button id="tx-inc-btn" class="btn-ghost btn-full" onclick="App.setTxType('income')">INCOME</button>
      </div>
      <div><label class="lbl">Amount ($)</label><input type="number" class="inp" id="tx-amount" placeholder="0.00"></div>
      <div><label class="lbl">Description</label><input class="inp" id="tx-desc" placeholder="e.g. Chipotle"></div>
      <div class="grid-2">
        <div><label class="lbl">Category</label><select class="inp" id="tx-cat">${['Food','Transport','Entertainment','Clothing','Health','Tech','Other'].map(c=>`<option>${c}</option>`).join('')}</select></div>
        <div><label class="lbl">Date</label><input type="date" class="inp" id="tx-date" value="${todayStr()}"></div>
      </div>
      <button class="btn btn-full" id="tx-save-btn" onclick="App.saveTx()">LOG EXPENSE</button>
    </div>`);
    window._txType='expense';
  },
  setTxType(t){
    window._txType=t;
    const expBtn=document.getElementById('tx-exp-btn');
    const incBtn=document.getElementById('tx-inc-btn');
    const saveBtn=document.getElementById('tx-save-btn');
    if(t==='expense'){
      if(expBtn){expBtn.className='btn btn-full';expBtn.style.cssText='background:rgba(248,113,113,.2);color:var(--red);border:1px solid rgba(248,113,113,.4)';}
      if(incBtn){incBtn.className='btn-ghost btn-full';incBtn.style.cssText='';}
      if(saveBtn)saveBtn.textContent='LOG EXPENSE';
    } else {
      if(incBtn){incBtn.className='btn btn-green btn-full';incBtn.style.cssText='';}
      if(expBtn){expBtn.className='btn-ghost btn-full';expBtn.style.cssText='';}
      if(saveBtn)saveBtn.textContent='LOG INCOME';
    }
  },
  saveTx(){
    const amount=document.getElementById('tx-amount')?.value;if(!amount)return;
    S.transactions=[{id:uid(),amount,type:window._txType||'expense',desc:document.getElementById('tx-desc')?.value||'',category:document.getElementById('tx-cat')?.value||'Other',date:document.getElementById('tx-date')?.value||todayStr()},...S.transactions];
    save();closeModal();renderPage();
  },
  openAddSavingsGoal(){
    openModal(`<div class="modal-header"><span class="modal-title">SAVINGS GOAL</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="col">
      <div><label class="lbl">Goal Name</label><input class="inp" id="sg-name" placeholder="e.g. New laptop"></div>
      <div class="grid-2">
        <div><label class="lbl">Target ($)</label><input type="number" class="inp" id="sg-target"></div>
        <div><label class="lbl">Saved so far ($)</label><input type="number" class="inp" id="sg-current" value="0"></div>
      </div>
      <button class="btn btn-green btn-full" onclick="App.saveSavingsGoal()">ADD GOAL</button>
    </div>`);
  },
  saveSavingsGoal(){
    const name=document.getElementById('sg-name')?.value.trim();const target=document.getElementById('sg-target')?.value;
    if(!name||!target)return;
    S.savingsGoals=[...S.savingsGoals,{id:uid(),name,target:+target,current:+(document.getElementById('sg-current')?.value||0)}];
    save();closeModal();renderPage();
  },
  connectPlaid(institution){
    if(!S.apiKeys?.plaid_client_id){
      alert('Please add your Plaid API keys in Settings first.');
      navigate('settings');return;
    }
    openModal(`<div class="modal-header"><span class="modal-title">CONNECT ${institution.toUpperCase()}</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="col" style="text-align:center;padding:10px 0">
      <div style="font-size:40px;margin-bottom:12px">🏦</div>
      <div style="font-size:14px;font-weight:600;margin-bottom:8px">Plaid Link Required</div>
      <div class="canvas-note" style="margin-bottom:16px">Plaid Link requires a backend server to generate a link_token. To complete setup:<br><br>
        <div class="col" style="text-align:left;gap:8px">
          <div class="row"><div class="step-num">1</div><span>Visit plaid.com/developers and create a free account</span></div>
          <div class="row"><div class="step-num">2</div><span>Create an app and get your client_id + secret</span></div>
          <div class="row"><div class="step-num">3</div><span>Add keys in Settings → API Keys</span></div>
          <div class="row"><div class="step-num">4</div><span>For now, add accounts manually using the + ADD button</span></div>
        </div>
      </div>
      <button class="btn btn-full" onclick="closeModal();App.openAddAccount()">ADD ACCOUNT MANUALLY</button>
    </div>`);
  },

  // ── HEALTH ───────────────────────────────────────
  logSleep(){
    const hours=document.getElementById('sleep-hours')?.value;if(!hours)return;
    const quality=document.getElementById('sleep-quality')?.value||'3';
    S.sleepLog=[{id:uid(),date:document.getElementById('sleep-date')?.value||todayStr(),hours:parseFloat(hours),quality:+quality},...S.sleepLog];
    save();renderPage();
  },
  logBodyMetric(){
    const weight=document.getElementById('metric-weight')?.value;if(!weight)return;
    S.bodyMetrics=[{id:uid(),date:document.getElementById('metric-date')?.value||todayStr(),weight:parseFloat(weight)},...S.bodyMetrics];
    save();renderPage();
  },
  openAddSupp(){
    openModal(`<div class="modal-header"><span class="modal-title">ADD SUPPLEMENT</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="col">
      <div><label class="lbl">Name</label><input class="inp" id="sp-name" placeholder="e.g. Creatine"></div>
      <div><label class="lbl">Dose</label><input class="inp" id="sp-dose" placeholder="e.g. 5g"></div>
      <div><label class="lbl">Timing</label><select class="inp" id="sp-timing">${['Morning','Pre-workout','Post-workout','With lunch','Evening','Before bed'].map(t=>`<option>${t}</option>`).join('')}</select></div>
      <button class="btn btn-red btn-full" onclick="App.saveSupp()">ADD</button>
    </div>`);
  },
  saveSupp(){
    const name=document.getElementById('sp-name')?.value.trim();if(!name)return;
    S.supplements=[...S.supplements,{id:uid(),name,dose:document.getElementById('sp-dose')?.value||'',timing:document.getElementById('sp-timing')?.value||'Morning'}];
    save();closeModal();renderPage();
  },
  toggleSupp(id){
    const today=todayStr();const cur=S.supplementLog[today]||[];
    S.supplementLog={...S.supplementLog,[today]:cur.includes(id)?cur.filter(x=>x!==id):[...cur,id]};
    save();renderPage();
  },
  deleteSupp(id){S.supplements=S.supplements.filter(s=>s.id!==id);save();renderPage();},

  // ── TIME / PRIORITIES ─────────────────────────────
  openAddPriorityItem(){
    openModal(`<div class="modal-header"><span class="modal-title">ADD PRIORITY ITEM</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="col">
      <div><label class="lbl">Task</label><input class="inp" id="pi-title" placeholder="What needs doing?"></div>
      <div><label class="lbl">Quadrant</label><select class="inp" id="pi-quad">
        <option value="do">DO NOW — Urgent + Important</option>
        <option value="plan">PLAN — Important, Not Urgent</option>
        <option value="delegate">DELEGATE — Urgent, Not Important</option>
        <option value="drop">DROP — Not Urgent, Not Important</option>
      </select></div>
      <button class="btn btn-full" onclick="App.savePriorityItem()">ADD</button>
    </div>`);
  },
  savePriorityItem(){
    const title=document.getElementById('pi-title')?.value.trim();if(!title)return;
    S.priorityItems=[...(S.priorityItems||[]),{id:uid(),title,quadrant:document.getElementById('pi-quad')?.value||'do'}];
    save();closeModal();renderPage();
  },
  deletePriorityItem(id){S.priorityItems=(S.priorityItems||[]).filter(i=>i.id!==id);save();renderPage();},

  // ── SOCIAL ────────────────────────────────────────
  openAddContact(){
    openModal(`<div class="modal-header"><span class="modal-title">ADD CONTACT</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="col">
      <div><label class="lbl">Name</label><input class="inp" id="ct-name" placeholder="Full name"></div>
      <div><label class="lbl">Frequency</label><select class="inp" id="ct-freq"><option value="weekly">Weekly</option><option value="biweekly">Bi-weekly</option><option value="monthly" selected>Monthly</option></select></div>
      <div><label class="lbl">Last Contact</label><input type="date" class="inp" id="ct-last" value="${todayStr()}"></div>
      <div><label class="lbl">Notes</label><input class="inp" id="ct-notes" placeholder="e.g. tennis teammate, friend from class"></div>
      <button class="btn btn-teal btn-full" onclick="App.saveContact()">ADD CONTACT</button>
    </div>`);
  },
  saveContact(){
    const name=document.getElementById('ct-name')?.value.trim();if(!name)return;
    S.contacts=[...S.contacts,{id:uid(),name,frequency:document.getElementById('ct-freq')?.value||'monthly',lastContact:document.getElementById('ct-last')?.value||todayStr(),notes:document.getElementById('ct-notes')?.value||''}];
    save();closeModal();renderPage();
  },
  markContacted(id){S.contacts=S.contacts.map(c=>c.id===id?{...c,lastContact:todayStr()}:c);save();renderPage();},
  deleteContact(id){S.contacts=S.contacts.filter(c=>c.id!==id);save();renderPage();},

  // ── SETTINGS ─────────────────────────────────────
  saveUsername(){
    const val=document.getElementById('username-inp')?.value.trim();
    if(!val)return;S.username=val;save();
    const el=document.getElementById('username-display');if(el)el.textContent=val.toUpperCase();
    showToast('Username saved!');
  },
  toggleTheme(){
    S.theme=S.theme==='dark'?'light':'dark';save();applyTheme();renderPage();
  },
  savePlaidKeys(){
    S.apiKeys={...S.apiKeys,plaid_client_id:document.getElementById('plaid-client-id')?.value.trim()||'',plaid_secret:document.getElementById('plaid-secret')?.value.trim()||'',plaid_env:document.getElementById('plaid-env')?.value||'sandbox'};
    save();showToast('Plaid keys saved!');renderPage();
  },
  saveCanvasKeys(){
    const url=document.getElementById('canvas-url')?.value.trim()||'';
    const token=document.getElementById('canvas-token')?.value.trim()||'';
    S.apiKeys={...S.apiKeys,canvas_url:url,canvas_token:token};save();
    if(url&&token)App.syncCanvas(url,token);
    else showToast('Canvas keys saved!');
    renderPage();
  },
  async syncCanvas(url,token){
    showToast('Syncing Canvas assignments…');
    try{
      const base=url.replace(/\/$/,'');
      const res=await fetch(`${base}/api/v1/courses?per_page=20`,{headers:{'Authorization':`Bearer ${token}`}});
      if(!res.ok)throw new Error('Canvas API error '+res.status);
      const courses=await res.json();
      let imported=0;
      for(const c of courses.slice(0,8)){
        const ar=await fetch(`${base}/api/v1/courses/${c.id}/assignments?per_page=50&bucket=upcoming`,{headers:{'Authorization':`Bearer ${token}`}});
        if(!ar.ok)continue;
        const assignments=await ar.json();
        assignments.forEach(a=>{
          const exists=S.assignments.some(ex=>ex.canvasId===a.id);
          if(!exists&&a.name){
            S.assignments.unshift({id:uid(),canvasId:a.id,title:a.name,course:c.name,dueDate:a.due_at?a.due_at.split('T')[0]:'',grade:'',done:false});
            imported++;
          }
        });
      }
      save();showToast(`Canvas synced! ${imported} assignments imported.`);renderPage();
    }catch(e){showToast('Canvas sync failed: '+e.message);}
  },
  openAddCourse(){
    openModal(`<div class="modal-header"><span class="modal-title">ADD COURSE</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="col">
      <div><label class="lbl">Course Name</label><input class="inp" id="cr-name" placeholder="e.g. MKTG 301"></div>
      <div><label class="lbl">Color</label><input type="color" class="inp" id="cr-color" value="#f5a623" style="height:44px;padding:4px"></div>
      <button class="btn btn-full" onclick="App.saveCourse()">ADD COURSE</button>
    </div>`);
  },
  saveCourse(){
    const name=document.getElementById('cr-name')?.value.trim();if(!name)return;
    S.courses=[...S.courses,{id:uid(),name,color:document.getElementById('cr-color')?.value||'#f5a623'}];
    save();closeModal();renderPage();
  },
  deleteCourse(id){S.courses=S.courses.filter(c=>c.id!==id);save();renderPage();},
  exportData(){
    const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lifedash-backup.json';a.click();
  },
  clearData(){
    if(confirm('Clear ALL data? This cannot be undone.')){{localStorage.removeItem(STORAGE_KEY);location.reload();}}
  },
};

// ════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--orange);color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:2000;pointer-events:none;opacity:0;transition:opacity .3s';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';clearTimeout(window._toastTm);window._toastTm=setTimeout(()=>t.style.opacity='0',2500);
}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
function buildShell(){
  const root=document.getElementById('root');
  const tabs=[
    ['home','⌂','Home'],['calendar','◫','Calendar'],['tennis','🎾','Tennis'],
    ['gym','💪','Gym'],['school','📚','School'],['growth','🧠','Growth'],
    ['finance','💰','Finance'],['health','❤️','Health'],['time','⏱','Time'],
    ['social','👥','Social'],
  ];
  root.innerHTML=`
  <!-- TOP BAR -->
  <div id="topbar">
    <span id="username-display">${esc(S.username.toUpperCase())}</span>
    <button id="settings-btn" onclick="navigate('settings')">⚙ SETTINGS</button>
  </div>
  <!-- TITLE -->
  <h1 class="dash-title">My Dashboard</h1>
  <!-- GOAL TICKER -->
  <div class="ticker-row">
    <div class="goal-ticker">
      <div class="goal-ticker-led"><div class="goal-ticker-led-dot"></div></div>
      <div class="goal-ticker-label">GOALS</div>
      <div class="goal-ticker-stage" id="goalTickerStage"></div>
      <div class="goal-ticker-meta" id="goalTickerMeta">0/0</div>
    </div>
  </div>
  <!-- PAGE CONTENT -->
  <div id="page-content"></div>
  <!-- BOTTOM NAV -->
  <nav id="bottom-nav">
    <div class="nav-inner">
      ${tabs.map(([id,icon,label])=>`<button class="nav-btn${id==='home'?' active':''}" data-tab="${id}" onclick="navigate('${id}')"><span class="icon">${icon}</span><span class="lbl">${label.toUpperCase()}</span></button>`).join('')}
    </div>
  </nav>`;
}

document.addEventListener('DOMContentLoaded',()=>{
  applyTheme();
  buildShell();
  renderPage();
  initTicker();
  // Handle habit dot clicks on home
  document.addEventListener('click',e=>{
    const dotId=e.target.dataset.habitDot;
    if(dotId)App.toggleHabit(dotId);
    const toggleId=e.target.dataset.toggleHabit||e.target.closest('[data-toggle-habit]')?.dataset.toggleHabit;
    if(toggleId)App.toggleHabit(toggleId);
  });
});
</script>
</body>
